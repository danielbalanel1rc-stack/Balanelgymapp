// ── STORAGE ───────────────────────────────────────────────────────────────
const K_LOG      = "gym-log-v2";
const K_SCHED    = "gym-schedules-v2";
const K_PHOTO    = "gym-photos-v1";
const K_INTENT   = "gym-intents-v1";
const K_ATHLETES = "gym-athletes-v1";

const ld = (k, def) => { try { const v = JSON.parse(localStorage.getItem(k)); return v ?? def; } catch { return def; } };
const sv = (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

const loadLog      = ()  => ld(K_LOG, {});
const saveLog      = l   => sv(K_LOG, l);
const loadSchedules= ()  => ld(K_SCHED, DEFAULT_SCHEDULES);
const saveSchedules= s   => sv(K_SCHED, s);
const loadPhotos   = ()  => ld(K_PHOTO, {});
const savePhotos   = p   => sv(K_PHOTO, p);
const loadIntents  = ()  => ld(K_INTENT, {});
const saveIntents  = i   => sv(K_INTENT, i);
const loadAthletes = ()  => ld(K_ATHLETES, DEFAULT_ATHLETES);
const saveAthletes = a   => sv(K_ATHLETES, a);

const dayKey = () => new Date().toISOString().slice(0, 10);
const sessionKey = (aid, wid) => `${aid}::${wid}::${dayKey()}`;
const intentKey  = (aid, wid, exid) => `${aid}::${wid}::${exid}`;

// ── REST TIMER ────────────────────────────────────────────────────────────
function RestTimer({ onClose }) {
  const [secs, setSecs] = useState(90);
  const [running, setRunning] = useState(true);
  const ref = useRef(null);
  useEffect(() => {
    if (running && secs > 0) ref.current = setTimeout(() => setSecs(s => s - 1), 1000);
    else if (secs === 0) setRunning(false);
    return () => clearTimeout(ref.current);
  }, [running, secs]);
  const radius = 54, circ = 2 * Math.PI * radius, stroke = circ * (1 - secs / 90);
  return (
    <div style={{ position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24 }}>
      <p style={{ color:"#aaa",fontSize:13,letterSpacing:3,textTransform:"uppercase" }}>Recupero</p>
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={radius} fill="none" stroke="#222" strokeWidth="8"/>
        <circle cx="70" cy="70" r={radius} fill="none" stroke={secs<=10?"#ff4444":secs<=30?"#ffaa00":"#00e5ff"} strokeWidth="8" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={stroke} style={{ transition:"stroke-dashoffset 1s linear,stroke 0.3s",transform:"rotate(-90deg)",transformOrigin:"70px 70px" }}/>
        <text x="70" y="78" textAnchor="middle" style={{ fill:"#fff",fontSize:32,fontFamily:"monospace",fontWeight:"bold" }}>{Math.floor(secs/60)}:{String(secs%60).padStart(2,"0")}</text>
      </svg>
      <div style={{ display:"flex",gap:8 }}>
        {[30,60,90,120].map(p => (
          <button key={p} onClick={() => { setSecs(p); setRunning(true); }} style={{ background:secs===p&&running?"#00e5ff22":"#111",border:`1px solid ${secs===p&&running?"#00e5ff":"#333"}`,color:"#ccc",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13 }}>{p}s</button>
        ))}
      </div>
      <div style={{ display:"flex",gap:12 }}>
        <button onClick={() => setRunning(r => !r)} style={{ background:running?"#333":"#00e5ff",color:running?"#fff":"#000",border:"none",borderRadius:12,padding:"10px 28px",fontWeight:"bold",cursor:"pointer",fontSize:15 }}>{running?"⏸ Pausa":"▶ Riprendi"}</button>
        <button onClick={onClose} style={{ background:"#1a1a1a",color:"#888",border:"1px solid #333",borderRadius:12,padding:"10px 20px",cursor:"pointer" }}>✕</button>
      </div>
    </div>
  );
}

// ── PHOTO MODAL ───────────────────────────────────────────────────────────
function PhotoModal({ photoKey, onClose }) {
  const [photos, setPhotos] = useState(loadPhotos());
  const existing = photos[photoKey];
  const inputRef = useRef(null);
  function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { const u = { ...photos, [photoKey]: ev.target.result }; setPhotos(u); savePhotos(u); };
    reader.readAsDataURL(file);
  }
  function remove() { const u = { ...photos }; delete u[photoKey]; setPhotos(u); savePhotos(u); }
  return (
    <div style={{ position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.9)",backdropFilter:"blur(6px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18,padding:24 }}>
      <p style={{ color:"#aaa",fontSize:13,letterSpacing:2,textTransform:"uppercase" }}>Foto macchinario</p>
      {existing
        ? <img src={existing} alt="" style={{ maxWidth:"90vw",maxHeight:"50vh",borderRadius:16,border:"1px solid #333" }}/>
        : <div style={{ width:220,height:220,borderRadius:16,background:"#111",border:"1px dashed #333",display:"flex",alignItems:"center",justifyContent:"center",color:"#444",fontSize:40 }}>📷</div>
      }
      <input ref={inputRef} type="file" accept="image/*" onChange={handleFile} style={{ display:"none" }}/>
      <div style={{ display:"flex",gap:10 }}>
        <button onClick={() => inputRef.current.click()} style={{ background:"#00e5ff",color:"#000",border:"none",borderRadius:12,padding:"10px 22px",fontWeight:"bold",cursor:"pointer",fontSize:14 }}>{existing?"Sostituisci":"Carica foto"}</button>
        {existing && <button onClick={remove} style={{ background:"#1a1a1a",color:"#ff6b6b",border:"1px solid #442222",borderRadius:12,padding:"10px 18px",cursor:"pointer",fontSize:14 }}>Rimuovi</button>}
        <button onClick={onClose} style={{ background:"#1a1a1a",color:"#888",border:"1px solid #333",borderRadius:12,padding:"10px 18px",cursor:"pointer",fontSize:14 }}>Chiudi</button>
      </div>
    </div>
  );
}

// ── WORKOUT SESSION ───────────────────────────────────────────────────────
function WorkoutSession({ athlete, workout, onBack }) {
  const color = workout.color;
  const [log, setLog] = useState(loadLog());
  const [intents, setIntents] = useState(loadIntents());
  const [photos] = useState(loadPhotos());
  const [timer, setTimer] = useState(false);
  const [photoModal, setPhotoModal] = useState(null);
  const [intentPrompt, setIntentPrompt] = useState(null); // { exId, exName }
  const key = sessionKey(athlete.id, workout.id);

  // previous session data (for auto-fill)
  const prevLog = (() => {
    const keys = Object.keys(log).filter(k => k.startsWith(`${athlete.id}::${workout.id}::`) && k !== key).sort().reverse();
    return keys.length ? log[keys[0]] : null;
  })();

  function getCell(exId, si) { return log[key]?.[exId]?.[si] || {}; }
  function setCell(exId, si, field, val) {
    const prev = log[key]?.[exId]?.[si] || {};
    const updated = { ...log, [key]: { ...(log[key]||{}), [exId]: { ...(log[key]?.[exId]||{}), [si]: { ...prev, [field]: val } } } };
    setLog(updated); saveLog(updated);
  }

  // get effective kg: this session > previous session > exercise default
  function effectiveKg(ex, si) {
    const thisKg = log[key]?.[ex.id]?.[si]?.kg;
    if (thisKg != null) return thisKg;
    const prevKg = prevLog?.[ex.id]?.[si]?.kg;
    if (prevKg != null) return prevKg;
    return ex.kg;
  }
  function effectiveReps(ex, si) {
    const thisReps = log[key]?.[ex.id]?.[si]?.reps;
    if (thisReps != null) return thisReps;
    return ex.sets[si].reps;
  }

  function markDone(ex, si, value) {
    setCell(ex.id, si, "done", value);
    // check if this was the last set → show intent prompt
    if (value) {
      const allDone = ex.sets.every((_, i) => i === si ? true : !!getCell(ex.id, i).done);
      if (allDone) {
        setTimeout(() => setIntentPrompt({ exId: ex.id, exName: ex.name }), 400);
      }
    }
  }

  function handleIntent(exId, action) {
    const k = intentKey(athlete.id, workout.id, exId);
    const updated = { ...intents, [k]: { action, date: dayKey() } };
    setIntents(updated); saveIntents(updated);
    setIntentPrompt(null);
  }

  const totalSets = workout.exercises.reduce((a, e) => a + e.sets.length, 0);
  const doneSets  = workout.exercises.reduce((a, e) => a + e.sets.filter((_, si) => getCell(e.id, si).done).length, 0);

  const intentLabels = { up: { icon:"⬆️", text:"Aumenta peso", color:"#39ff14" }, keep: { icon:"➡️", text:"Mantieni", color:"#ffaa00" }, down: { icon:"⬇️", text:"Diminuisci", color:"#ff6b6b" } };

  return (
    <div style={{ minHeight:"100vh",background:"#0a0a0a",fontFamily:"'Space Grotesk',sans-serif" }}>
      {timer && <RestTimer onClose={() => setTimer(false)}/>}
      {photoModal && <PhotoModal photoKey={photoModal} onClose={() => setPhotoModal(null)}/>}
      {intentPrompt && <IntentPanel exName={intentPrompt.exName} onChoose={act => handleIntent(intentPrompt.exId, act)} onSkip={() => setIntentPrompt(null)}/>}

      {/* Header */}
      <div style={{ background:`linear-gradient(135deg,${color}22,#0a0a0a)`,borderBottom:`1px solid ${color}44`,padding:"20px 20px 16px" }}>
        <button onClick={onBack} style={{ background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:14,padding:0,marginBottom:12 }}>← Indietro</button>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
          <div>
            <span style={{ fontSize:11,background:color+"33",color,border:`1px solid ${color}55`,borderRadius:6,padding:"2px 8px",letterSpacing:2,textTransform:"uppercase" }}>{athlete.avatar} {athlete.name}</span>
            <h2 style={{ color:"#fff",fontSize:24,fontWeight:800,margin:"4px 0 0" }}>{workout.name}</h2>
            {workout.tag && <p style={{ color:"#666",fontSize:11,margin:"4px 0 0",fontStyle:"italic" }}>{workout.tag}</p>}
          </div>
          <button onClick={() => setTimer(true)} style={{ background:"#0a0a0a",border:`1px solid ${color}`,color,borderRadius:12,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:600 }}>⏱ Timer</button>
        </div>
        <div style={{ marginTop:16 }}>
          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:6 }}>
            <span style={{ color:"#666",fontSize:12 }}>Progressione</span>
            <span style={{ color,fontSize:12,fontWeight:700 }}>{doneSets}/{totalSets} serie</span>
          </div>
          <div style={{ background:"#1a1a1a",borderRadius:4,height:4,overflow:"hidden" }}>
            <div style={{ width:`${(doneSets/totalSets)*100}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.4s ease" }}/>
          </div>
        </div>
      </div>

      {/* Exercises */}
      <div style={{ padding:"16px 16px 80px" }}>
        {workout.exercises.map(ex => {
          const ik = intentKey(athlete.id, workout.id, ex.id);
          const prevIntent = intents[ik];
          const il = prevIntent ? intentLabels[prevIntent.action] : null;
          const hasPhoto = !!photos[`${athlete.id}::${ex.id}`];
          const allDone = ex.sets.every((_, si) => getCell(ex.id, si).done);

          // previous session kg for this exercise (avg across sets if different)
          const prevKgDisplay = prevLog?.[ex.id]?.[0]?.kg;

          return (
            <div key={ex.id} style={{ background:"#111",border:`1px solid ${allDone ? "#39ff1444" : "#1e1e1e"}`,borderRadius:16,marginBottom:12,overflow:"hidden",transition:"border-color 0.3s" }}>
              {/* Exercise header */}
              <div style={{ padding:"12px 16px 8px",borderBottom:"1px solid #1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                <div style={{ display:"flex",alignItems:"center",gap:8,flex:1 }}>
                  <span style={{ color:allDone?"#39ff14":"#fff",fontWeight:700,fontSize:15,transition:"color 0.3s" }}>{ex.name}</span>
                  <button onClick={() => setPhotoModal(`${athlete.id}::${ex.id}`)} style={{ background:hasPhoto?"#00e5ff22":"#1a1a1a",border:`1px solid ${hasPhoto?"#00e5ff66":"#333"}`,color:hasPhoto?"#00e5ff":"#555",borderRadius:"50%",width:22,height:22,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>ℹ️</button>
                </div>
                <div style={{ display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4 }}>
                  {il && (
                    <span style={{ color:il.color,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:3 }}>
                      {il.icon} {il.text}
                      {prevKgDisplay ? <span style={{ color:"#555",fontWeight:400 }}>&nbsp;(era {prevKgDisplay}kg)</span> : null}
                    </span>
                  )}
                  {allDone && <span style={{ color:"#39ff14",fontSize:11,fontWeight:700 }}>✓ Completato</span>}
                </div>
              </div>

              {/* Sets */}
              <div style={{ padding:"10px 16px 14px",display:"flex",flexDirection:"column",gap:10 }}>
                <div style={{ display:"grid",gridTemplateColumns:"22px 44px 58px 58px 38px",gap:6,paddingBottom:4,borderBottom:"1px solid #1a1a1a" }}>
                  <span style={{ color:"#444",fontSize:10,textAlign:"center" }}>#</span>
                  <span style={{ color:"#444",fontSize:10,textAlign:"center" }}>OBJ</span>
                  <span style={{ color:"#ff6b9d",fontSize:10,textAlign:"center" }}>REP</span>
                  <span style={{ color:"#444",fontSize:10,textAlign:"center" }}>KG</span>
                  <span style={{ color:"#444",fontSize:10,textAlign:"center" }}>✓</span>
                </div>
                {ex.sets.map((set, si) => {
                  const cell = getCell(ex.id, si);
                  const isDone = !!cell.done;
                  const kg = cell.kg != null ? cell.kg : effectiveKg(ex, si);
                  const reps = cell.reps != null ? cell.reps : effectiveReps(ex, si);
                  return (
                    <div key={si} style={{ display:"grid",gridTemplateColumns:"22px 44px 58px 58px 38px",gap:6,alignItems:"center",opacity:isDone?0.55:1,transition:"opacity 0.3s" }}>
                      <span style={{ color:"#555",fontSize:13,textAlign:"center",fontFamily:"monospace" }}>{si+1}</span>
                      <span style={{ color:"#555",fontSize:12,textAlign:"center" }}>{set.reps}</span>
                      <input type="number" value={reps===0?"":reps} placeholder="rep"
                        onChange={e => setCell(ex.id, si, "reps", parseInt(e.target.value)||0)}
                        style={{ background:isDone?"#0d0d0d":"#1a1a1a",border:`1px solid ${isDone?"#1a1a1a":"#ff6b9d66"}`,color:isDone?"#444":"#fff",borderRadius:8,padding:"5px 2px",textAlign:"center",fontSize:13,fontWeight:600,width:"100%",outline:"none" }}/>
                      <input type="number" value={kg===0?"":kg} placeholder="kg"
                        onChange={e => setCell(ex.id, si, "kg", parseFloat(e.target.value)||0)}
                        style={{ background:isDone?"#0d0d0d":"#1a1a1a",border:`1px solid ${isDone?"#1a1a1a":color+"55"}`,color:isDone?"#444":"#fff",borderRadius:8,padding:"5px 2px",textAlign:"center",fontSize:13,fontWeight:600,width:"100%",outline:"none" }}/>
                      <button onClick={() => markDone(ex, si, !isDone)}
                        style={{ background:isDone?"#39ff14":"#1a1a1a",border:`1px solid ${isDone?"#39ff14":"#333"}`,borderRadius:8,height:34,color:isDone?"#000":"#555",cursor:"pointer",fontWeight:"bold",fontSize:15,boxShadow:isDone?"0 0 10px #39ff1488":"none",transition:"all 0.2s" }}>
                        {isDone?"✓":"○"}
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}

        {doneSets===totalSets && doneSets>0 && (
          <div style={{ background:`linear-gradient(135deg,${color}22,#0a0a0a)`,border:`1px solid ${color}`,borderRadius:16,padding:24,textAlign:"center",marginTop:8 }}>
            <div style={{ fontSize:48,marginBottom:8 }}>🏆</div>
            <p style={{ color,fontWeight:800,fontSize:20,margin:0 }}>Allenamento Completato!</p>
            <p style={{ color:"#666",fontSize:13,marginTop:4 }}>Ottimo lavoro {athlete.name}!</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ── EDIT SCHEDULE ─────────────────────────────────────────────────────────
function EditScheduleView({ athlete, schedules, setSchedules, onBack }) {
  const mySchedule = schedules[athlete.id] || [];

  function update(newSched) {
    const all = { ...schedules, [athlete.id]: newSched };
    setSchedules(all); saveSchedules(all);
  }
  function addWorkout() {
    const name = prompt("Nome nuovo allenamento (es. PUSH 3):"); if (!name) return;
    const colors = ["#ff6b9d","#a78bfa","#34d399","#fb923c","#60a5fa","#f472b6","#39ff14","#ffaa00"];
    update([...mySchedule, { id:slug(name)+"-"+uid(), name:name.toUpperCase(), tag:"", color:colors[mySchedule.length%colors.length], exercises:[] }]);
  }
  function removeWorkout(wid) { if (!confirm("Eliminare questo allenamento?")) return; update(mySchedule.filter(w => w.id!==wid)); }
  function addExercise(wid) {
    const name = prompt("Nome esercizio:"); if (!name) return;
    const kg = parseFloat(prompt("Peso iniziale (kg), 0 se non applicabile:","0"))||0;
    const nSets = parseInt(prompt("Quante serie?","3"))||3;
    const reps = parseInt(prompt("Ripetizioni obiettivo:","12"))||12;
    update(mySchedule.map(w => w.id===wid ? { ...w, exercises:[...w.exercises, { id:slug(name)+"-"+uid(), name, kg, sets:Array.from({length:nSets},()=>({reps})) }] } : w));
  }
  function removeExercise(wid, exId) { if (!confirm("Eliminare?")) return; update(mySchedule.map(w => w.id===wid ? { ...w, exercises:w.exercises.filter(e => e.id!==exId) } : w)); }
  function renameExercise(wid, exId) {
    const ex = mySchedule.find(w=>w.id===wid)?.exercises.find(e=>e.id===exId);
    const name = prompt("Nuovo nome:", ex.name); if (!name) return;
    update(mySchedule.map(w => w.id===wid ? { ...w, exercises:w.exercises.map(e => e.id===exId ? { ...e, name } : e) } : w));
  }
  function editKg(wid, exId) {
    const ex = mySchedule.find(w=>w.id===wid)?.exercises.find(e=>e.id===exId);
    const kg = parseFloat(prompt("Peso di base (kg):", ex.kg)); if (isNaN(kg)) return;
    update(mySchedule.map(w => w.id===wid ? { ...w, exercises:w.exercises.map(e => e.id===exId ? { ...e, kg } : e) } : w));
  }
  function addSet(wid, exId) {
    const reps = parseInt(prompt("Ripetizioni nuova serie:","10"))||10;
    update(mySchedule.map(w => w.id===wid ? { ...w, exercises:w.exercises.map(e => e.id===exId ? { ...e, sets:[...e.sets,{reps}] } : e) } : w));
  }
  function removeSet(wid, exId) {
    update(mySchedule.map(w => w.id===wid ? { ...w, exercises:w.exercises.map(e => e.id===exId && e.sets.length>1 ? { ...e, sets:e.sets.slice(0,-1) } : e) } : w));
  }

  return (
    <div style={{ minHeight:"100vh",background:"#0a0a0a",fontFamily:"'Space Grotesk',sans-serif" }}>
      <div style={{ padding:"20px 20px 16px",borderBottom:"1px solid #1a1a1a" }}>
        <button onClick={onBack} style={{ background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:14,padding:0,marginBottom:12 }}>← Indietro</button>
        <h2 style={{ color:"#fff",fontSize:22,fontWeight:800,margin:0 }}>✏️ Scheda {athlete.name}</h2>
      </div>
      <div style={{ padding:16 }}>
        <button onClick={addWorkout} style={{ width:"100%",background:"#1a1a1a",border:"1px dashed #444",color:"#aaa",borderRadius:14,padding:14,cursor:"pointer",fontWeight:700,fontSize:14,marginBottom:16 }}>+ Nuovo allenamento</button>
        {mySchedule.map(w => (
          <div key={w.id} style={{ background:"#111",border:`1px solid ${w.color}44`,borderRadius:16,marginBottom:14,overflow:"hidden" }}>
            <div style={{ background:w.color+"1a",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
              <span style={{ color:w.color,fontWeight:800,fontSize:15 }}>{w.name}</span>
              <button onClick={() => removeWorkout(w.id)} style={{ background:"#ff445522",border:"1px solid #ff445555",color:"#ff6b6b",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12 }}>Elimina</button>
            </div>
            <div style={{ padding:12 }}>
              {w.exercises.map(ex => (
                <div key={ex.id} style={{ background:"#0d0d0d",borderRadius:12,padding:12,marginBottom:8 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
                    <span style={{ color:"#fff",fontWeight:600,fontSize:13 }}>{ex.name}</span>
                    <div style={{ display:"flex",gap:5 }}>
                      <button onClick={() => renameExercise(w.id,ex.id)} style={{ background:"#222",border:"1px solid #333",color:"#aaa",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11 }}>✏️</button>
                      <button onClick={() => editKg(w.id,ex.id)} style={{ background:"#fb923c22",border:"1px solid #fb923c44",color:"#fb923c",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11 }}>kg</button>
                      <button onClick={() => removeExercise(w.id,ex.id)} style={{ background:"#ff445522",border:"1px solid #ff445555",color:"#ff6b6b",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11 }}>🗑</button>
                    </div>
                  </div>
                  <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                    <span style={{ color:"#555",fontSize:12 }}>{ex.sets.length} serie · {ex.kg}kg base</span>
                    <button onClick={() => addSet(w.id,ex.id)} style={{ background:"#1a1a1a",border:"1px solid #333",color:"#00e5ff",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:12 }}>+ serie</button>
                    <button onClick={() => removeSet(w.id,ex.id)} style={{ background:"#1a1a1a",border:"1px solid #333",color:"#ff6b6b",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:12 }}>− serie</button>
                  </div>
                </div>
              ))}
              <button onClick={() => addExercise(w.id)} style={{ width:"100%",background:"none",border:"1px dashed #333",color:"#666",borderRadius:10,padding:10,cursor:"pointer",fontSize:13,marginTop:4 }}>+ Aggiungi esercizio</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── HISTORY VIEW ──────────────────────────────────────────────────────────
function HistoryView({ athlete, schedules, onBack }) {
  const log = loadLog();
  const mySchedule = schedules[athlete.id] || [];
  const entries = Object.entries(log)
    .filter(([k]) => k.startsWith(athlete.id+"::"))
    .map(([k,v]) => {
      const [,wid,date] = k.split("::");
      const workout = mySchedule.find(w => w.id===wid);
      return { wid,date,name:workout?.name||wid,color:workout?.color||athlete.color,data:v,workout };
    })
    .sort((a,b) => b.date.localeCompare(a.date));

  return (
    <div style={{ minHeight:"100vh",background:"#0a0a0a",fontFamily:"'Space Grotesk',sans-serif" }}>
      <div style={{ padding:"20px 20px 16px",borderBottom:"1px solid #1a1a1a" }}>
        <button onClick={onBack} style={{ background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:14,padding:0,marginBottom:12 }}>← Indietro</button>
        <h2 style={{ color:"#fff",fontSize:22,fontWeight:800,margin:0 }}>{athlete.avatar} Storico {athlete.name}</h2>
      </div>
      <div style={{ padding:16 }}>
        {entries.length===0 && <p style={{ color:"#444",textAlign:"center",marginTop:48 }}>Nessun allenamento ancora.</p>}
        {entries.map((e,i) => (
          <div key={i} style={{ background:"#111",border:"1px solid #1e1e1e",borderRadius:14,marginBottom:10,padding:"14px 16px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",marginBottom:8 }}>
              <span style={{ color:"#fff",fontWeight:700 }}>{e.name}</span>
              <span style={{ color:"#555",fontSize:12 }}>{e.date}</span>
            </div>
            {Object.entries(e.data).map(([exId,sets]) => {
              const ex = e.workout?.exercises.find(x => x.id===exId); if (!ex) return null;
              return (
                <div key={exId} style={{ marginBottom:6 }}>
                  <span style={{ color:e.color,fontSize:12,fontWeight:600 }}>{ex.name}</span>
                  <div style={{ display:"flex",gap:8,flexWrap:"wrap",marginTop:3 }}>
                    {Object.entries(sets).map(([si,sv]) => (
                      <span key={si} style={{ background:"#1a1a1a",color:"#aaa",borderRadius:6,padding:"2px 8px",fontSize:12 }}>S{parseInt(si)+1}: {sv.reps??"?"}rep · {sv.kg??0}kg</span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MANAGE ATHLETES SCREEN ────────────────────────────────────────────────
const AVATAR_OPTIONS = ["💪","🌸","🔥","⚡","🦁","🐺","🎯","🏆","🌟","👊","🦅","🐉"];
const COLOR_OPTIONS  = ["#00e5ff","#ff6b9d","#a78bfa","#34d399","#fb923c","#60a5fa","#f472b6","#ffaa00","#39ff14","#ff4455"];

function ManageAthletesScreen({ athletes, setAthletes, schedules, setSchedules, onBack }) {
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");
  const [newColor, setNewColor] = useState("#a78bfa");
  const [newAvatar, setNewAvatar] = useState("💪");

  function addAthlete() {
    if (!newName.trim()) return;
    const id = slug(newName) + "-" + uid();
    const a = { id, name: newName.trim(), color: newColor, accent: newColor, avatar: newAvatar };
    const updated = [...athletes, a];
    setAthletes(updated); saveAthletes(updated);
    // empty schedule
    const newSched = { ...schedules, [id]: [] };
    setSchedules(newSched); saveSchedules(newSched);
    setAdding(false); setNewName(""); setNewColor("#a78bfa"); setNewAvatar("💪");
  }

  function removeAthlete(id) {
    if (!confirm("Eliminare questo profilo e tutti i suoi dati?")) return;
    const updated = athletes.filter(a => a.id !== id);
    setAthletes(updated); saveAthletes(updated);
    // also remove log entries and schedules
    const log = loadLog();
    const newLog = Object.fromEntries(Object.entries(log).filter(([k]) => !k.startsWith(id+"::")));
    saveLog(newLog);
    const newSched = { ...schedules }; delete newSched[id]; setSchedules(newSched); saveSchedules(newSched);
  }

  function renameAthlete(id) {
    const a = athletes.find(x => x.id===id);
    const name = prompt("Nuovo nome:", a.name); if (!name) return;
    const updated = athletes.map(x => x.id===id ? { ...x, name } : x);
    setAthletes(updated); saveAthletes(updated);
  }

  function changeColor(id, color) {
    const updated = athletes.map(x => x.id===id ? { ...x, color, accent:color } : x);
    setAthletes(updated); saveAthletes(updated);
  }

  function changeAvatar(id, avatar) {
    const updated = athletes.map(x => x.id===id ? { ...x, avatar } : x);
    setAthletes(updated); saveAthletes(updated);
  }

  return (
    <div style={{ minHeight:"100vh",background:"#0a0a0a",fontFamily:"'Space Grotesk',sans-serif" }}>
      <div style={{ padding:"20px 20px 16px",borderBottom:"1px solid #1a1a1a" }}>
        <button onClick={onBack} style={{ background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:14,padding:0,marginBottom:12 }}>← Home</button>
        <h2 style={{ color:"#fff",fontSize:22,fontWeight:800,margin:0 }}>👥 Gestisci profili</h2>
        <p style={{ color:"#555",fontSize:12,marginTop:4 }}>Aggiungi, rinomina o elimina atleti</p>
      </div>
      <div style={{ padding:16 }}>
        {athletes.map(a => (
          <div key={a.id} style={{ background:"#111",border:`1px solid ${a.color}33`,borderRadius:16,padding:16,marginBottom:12 }}>
            <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:12 }}>
              <div style={{ width:48,height:48,borderRadius:"50%",background:`${a.color}22`,border:`2px solid ${a.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22 }}>{a.avatar}</div>
              <div style={{ flex:1 }}>
                <p style={{ color:"#fff",fontWeight:700,fontSize:16,margin:0 }}>{a.name}</p>
                <p style={{ color:"#555",fontSize:12,margin:"2px 0 0" }}>{schedules[a.id]?.length||0} allenamenti</p>
              </div>
              <button onClick={() => renameAthlete(a.id)} style={{ background:"#222",border:"1px solid #333",color:"#aaa",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13 }}>✏️ Nome</button>
              {athletes.length > 1 && (
                <button onClick={() => removeAthlete(a.id)} style={{ background:"#ff445522",border:"1px solid #ff445555",color:"#ff6b6b",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13 }}>🗑</button>
              )}
            </div>
            {/* Color picker */}
            <p style={{ color:"#444",fontSize:10,letterSpacing:2,marginBottom:8 }}>COLORE</p>
            <div style={{ display:"flex",gap:7,flexWrap:"wrap",marginBottom:12 }}>
              {COLOR_OPTIONS.map(c => (
                <button key={c} onClick={() => changeColor(a.id,c)} style={{ width:28,height:28,borderRadius:"50%",background:c,border:a.color===c?"3px solid #fff":"2px solid transparent",cursor:"pointer" }}/>
              ))}
            </div>
            {/* Avatar picker */}
            <p style={{ color:"#444",fontSize:10,letterSpacing:2,marginBottom:8 }}>AVATAR</p>
            <div style={{ display:"flex",gap:7,flexWrap:"wrap" }}>
              {AVATAR_OPTIONS.map(av => (
                <button key={av} onClick={() => changeAvatar(a.id,av)} style={{ width:36,height:36,borderRadius:10,background:a.avatar===av?"#ffffff22":"#1a1a1a",border:a.avatar===av?"1px solid #fff":"1px solid #333",cursor:"pointer",fontSize:18 }}>{av}</button>
              ))}
            </div>
          </div>
        ))}

        {!adding ? (
          <button onClick={() => setAdding(true)} style={{ width:"100%",background:"#1a1a1a",border:"1px dashed #444",color:"#aaa",borderRadius:14,padding:14,cursor:"pointer",fontWeight:700,fontSize:14,marginTop:4 }}>+ Aggiungi nuovo atleta</button>
        ) : (
          <div style={{ background:"#111",border:"1px solid #333",borderRadius:16,padding:16,marginTop:4 }}>
            <p style={{ color:"#fff",fontWeight:700,fontSize:15,marginBottom:14 }}>Nuovo atleta</p>
            <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nome atleta…"
              style={{ width:"100%",background:"#1a1a1a",border:"1px solid #333",color:"#fff",borderRadius:12,padding:"10px 14px",fontSize:15,outline:"none",marginBottom:12 }}/>
            <p style={{ color:"#444",fontSize:10,letterSpacing:2,marginBottom:8 }}>COLORE</p>
            <div style={{ display:"flex",gap:7,flexWrap:"wrap",marginBottom:12 }}>
              {COLOR_OPTIONS.map(c => (
                <button key={c} onClick={() => setNewColor(c)} style={{ width:28,height:28,borderRadius:"50%",background:c,border:newColor===c?"3px solid #fff":"2px solid transparent",cursor:"pointer" }}/>
              ))}
            </div>
            <p style={{ color:"#444",fontSize:10,letterSpacing:2,marginBottom:8 }}>AVATAR</p>
            <div style={{ display:"flex",gap:7,flexWrap:"wrap",marginBottom:16 }}>
              {AVATAR_OPTIONS.map(av => (
                <button key={av} onClick={() => setNewAvatar(av)} style={{ width:36,height:36,borderRadius:10,background:newAvatar===av?"#ffffff22":"#1a1a1a",border:newAvatar===av?"1px solid #fff":"1px solid #333",cursor:"pointer",fontSize:18 }}>{av}</button>
              ))}
            </div>
            <div style={{ display:"flex",gap:8 }}>
              <button onClick={addAthlete} style={{ flex:1,background:newColor,color:"#000",border:"none",borderRadius:12,padding:"12px",fontWeight:700,cursor:"pointer",fontSize:14 }}>Aggiungi {newAvatar}</button>
              <button onClick={() => setAdding(false)} style={{ background:"#1a1a1a",color:"#888",border:"1px solid #333",borderRadius:12,padding:"12px 16px",cursor:"pointer" }}>Annulla</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── CALENDAR VIEW ────────────────────────────────────────────────────────
function CalendarView({ athletes, schedules, onBack }) {
  const log = loadLog();
  const now = new Date();
  const [viewYear, setViewYear] = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());

  const gymDays = {};
  Object.entries(log).forEach(([k]) => {
    const parts = k.split("::"); if (parts.length<3) return;
    const [aid, wid, date] = parts;
    const a = athletes.find(x=>x.id===aid); if (!a) return;
    const w = schedules[aid]?.find(x=>x.id===wid);
    if (!gymDays[date]) gymDays[date]=[];
    gymDays[date].push({ aid, name:w?.name||wid, color:w?.color||a.color, avatar:a.avatar });
  });

  const allDates = Object.keys(gymDays).sort();
  const mk2 = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}`;
  let streak=0; let check=new Date(now.toISOString().slice(0,10));
  while(true){ const ds=check.toISOString().slice(0,10); if(gymDays[ds]){streak++;check.setDate(check.getDate()-1);}else break; }

  const MN=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const DN=["L","M","M","G","V","S","D"];
  const firstDay=new Date(viewYear,viewMonth,1);
  let off=(firstDay.getDay()+6)%7;
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  const cells=[]; for(let i=0;i<off;i++)cells.push(null); for(let d=1;d<=dim;d++)cells.push(d);
  const todayStr=now.toISOString().slice(0,10);

  return (
    <div style={{ minHeight:"100vh",background:"#0a0a0a",fontFamily:"'Space Grotesk',sans-serif" }}>
      <div style={{ padding:"20px 20px 16px",borderBottom:"1px solid #111",background:"#0d0d0d" }}>
        <button onClick={onBack} style={{ background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:14,padding:0,marginBottom:12 }}>← Home</button>
        <h2 style={{ color:"#fff",fontSize:22,fontWeight:900,margin:0 }}>📅 Registro Presenze</h2>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"16px 16px 0" }}>
        {[{label:"Totale sessioni",value:allDates.length,icon:"🏋️",color:"#00e5ff"},{label:"Questo mese",value:allDates.filter(d=>d.startsWith(mk2)).length,icon:"📆",color:"#ff6b9d"},{label:"Streak attuale",value:`${streak}gg`,icon:"🔥",color:"#fb923c"}].map((s,i)=>(
          <div key={i} style={{ background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"12px 10px",textAlign:"center" }}>
            <div style={{ fontSize:22 }}>{s.icon}</div>
            <div style={{ color:s.color,fontWeight:800,fontSize:20,margin:"4px 0 2px" }}>{s.value}</div>
            <div style={{ color:"#555",fontSize:10,lineHeight:1.3 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 16px 12px" }}>
        <button onClick={()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);}} style={{ background:"#111",border:"1px solid #222",color:"#888",borderRadius:10,padding:"6px 14px",cursor:"pointer",fontSize:18 }}>‹</button>
        <span style={{ color:"#fff",fontWeight:800,fontSize:17 }}>{MN[viewMonth]} {viewYear}</span>
        <button onClick={()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);}} style={{ background:"#111",border:"1px solid #222",color:"#888",borderRadius:10,padding:"6px 14px",cursor:"pointer",fontSize:18 }}>›</button>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,padding:"0 16px 6px" }}>
        {DN.map((d,i)=><div key={i} style={{ textAlign:"center",color:i>=5?"#ff6b9d66":"#444",fontSize:11,fontWeight:700 }}>{d}</div>)}
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,padding:"0 16px 24px" }}>
        {cells.map((day,i)=>{
          if(!day) return <div key={i}/>;
          const ds=`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const sessions=gymDays[ds]||[];
          const isT=ds===todayStr; const has=sessions.length>0; const isW=(i%7)>=5;
          const aids=[...new Set(sessions.map(s=>s.aid))];
          return (
            <div key={i} style={{ background:has?"#111":"#0d0d0d",border:isT?"1.5px solid #fff":has?"1px solid #1e1e1e":"1px solid #111",borderRadius:10,padding:"6px 4px",minHeight:54,display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}>
              <span style={{ color:isT?"#fff":isW?"#888":"#666",fontSize:12,fontWeight:isT?800:500 }}>{day}</span>
              {aids.length>0 && <div style={{ display:"flex",gap:3,flexWrap:"wrap",justifyContent:"center" }}>{aids.map(aid=>{ const a=athletes.find(x=>x.id===aid); return <div key={aid} style={{ width:8,height:8,borderRadius:"50%",background:a?.color||"#888" }}/>; })}</div>}
              {sessions.slice(0,2).map((s,si)=><div key={si} style={{ fontSize:8,background:s.color+"33",color:s.color,borderRadius:4,padding:"1px 4px",lineHeight:1.4,maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{s.name}</div>)}
            </div>
          );
        })}
      </div>
      <div style={{ padding:"0 16px 16px",display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap" }}>
        {athletes.map(a=><div key={a.id} style={{ display:"flex",alignItems:"center",gap:6 }}><div style={{ width:10,height:10,borderRadius:"50%",background:a.color }}/><span style={{ color:"#555",fontSize:12 }}>{a.name}</span></div>)}
      </div>
      <div style={{ padding:"0 16px 48px" }}>
        <p style={{ color:"#333",fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:12 }}>Ultime sessioni</p>
        {allDates.slice().reverse().slice(0,10).map(date=>(
          <div key={date} style={{ background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"12px 14px",marginBottom:8 }}>
            <span style={{ color:"#fff",fontWeight:700,fontSize:13 }}>{date}</span>
            <div style={{ display:"flex",gap:6,marginTop:4,flexWrap:"wrap" }}>
              {gymDays[date].map((s,i)=>{ const a=athletes.find(x=>x.id===s.aid); return <span key={i} style={{ fontSize:11,background:s.color+"22",color:s.color,borderRadius:6,padding:"2px 7px" }}>{a?.avatar} {s.name}</span>; })}
            </div>
          </div>
        ))}
        {allDates.length===0 && <p style={{ color:"#333",textAlign:"center",marginTop:32 }}>Nessuna sessione ancora.</p>}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [athleteId, setAthleteId] = useState(null);
  const [workoutId, setWorkoutId] = useState(null);
  const [schedules, setSchedules] = useState(loadSchedules());
  const [athletes, setAthletes] = useState(loadAthletes());

  const athlete = athletes.find(a => a.id===athleteId);
  const workout = athlete ? (schedules[athlete.id]||[]).find(w => w.id===workoutId) : null;

  const go = (s, aid=null, wid=null) => { setAthleteId(aid); setWorkoutId(wid); setScreen(s); window.scrollTo(0,0); };

  if (screen==="workout" && athlete && workout)
    return <WorkoutSession athlete={athlete} workout={workout} onBack={()=>go("athlete",athlete.id)}/>;
  if (screen==="athlete" && athlete)
    return <AthleteHome athlete={athlete} schedules={schedules} onWorkout={wid=>go("workout",athlete.id,wid)} onHistory={()=>go("history",athlete.id)} onEdit={()=>go("edit",athlete.id)} onBack={()=>go("home")}/>;
  if (screen==="history" && athlete)
    return <HistoryView athlete={athlete} schedules={schedules} onBack={()=>go("athlete",athlete.id)}/>;
  if (screen==="edit" && athlete)
    return <EditScheduleView athlete={athlete} schedules={schedules} setSchedules={setSchedules} onBack={()=>go("athlete",athlete.id)}/>;
  if (screen==="calendar")
    return <CalendarView athletes={athletes} schedules={schedules} onBack={()=>go("home")}/>;
  if (screen==="manage-athletes")
    return <ManageAthletesScreen athletes={athletes} setAthletes={setAthletes} schedules={schedules} setSchedules={setSchedules} onBack={()=>go("home")}/>;

  // HOME
  return (
    <div style={{ minHeight:"100vh",background:"#0a0a0a",fontFamily:"'Space Grotesk',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24 }}>
      <div style={{ textAlign:"center",marginBottom:40 }}>
        <div style={{ fontSize:48,marginBottom:12 }}>🏋️</div>
        <h1 style={{ fontSize:32,fontWeight:900,margin:0,background:"linear-gradient(90deg,#00e5ff,#ff6b9d)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent" }}>GYM TRACKER</h1>
        <p style={{ color:"#444",fontSize:13,marginTop:6,letterSpacing:2 }}>{athletes.map(a=>a.name).join(" & ").toUpperCase()}</p>
      </div>
      <div style={{ display:"flex",gap:12,width:"100%",maxWidth:420,flexWrap:"wrap",justifyContent:"center" }}>
        {athletes.map(a => (
          <button key={a.id} onClick={()=>go("athlete",a.id)} style={{ flex:"1 1 140px",minWidth:140,maxWidth:200,background:"#111",border:`1px solid ${a.color}44`,borderRadius:20,padding:"24px 12px",cursor:"pointer",textAlign:"center" }}>
            <div style={{ fontSize:40,marginBottom:8 }}>{a.avatar}</div>
            <p style={{ color:"#fff",fontWeight:800,fontSize:18,margin:0 }}>{a.name}</p>
            <p style={{ color:"#555",fontSize:11,margin:"4px 0 0" }}>{schedules[a.id]?.length||0} allenamenti</p>
            <div style={{ marginTop:12,background:a.color,color:"#000",borderRadius:10,padding:"7px 0",fontWeight:700,fontSize:12 }}>Inizia →</div>
          </button>
        ))}
      </div>
      <div style={{ display:"flex",gap:10,marginTop:24,flexWrap:"wrap",justifyContent:"center" }}>
        <button onClick={()=>go("calendar")} style={{ background:"#111",border:"1px solid #222",color:"#888",borderRadius:12,padding:"10px 20px",cursor:"pointer",fontSize:13,fontWeight:600 }}>📅 Presenze</button>
        <button onClick={()=>go("manage-athletes")} style={{ background:"#111",border:"1px solid #222",color:"#888",borderRadius:12,padding:"10px 20px",cursor:"pointer",fontSize:13,fontWeight:600 }}>👥 Profili</button>
      </div>
      <p style={{ color:"#2a2a2a",fontSize:11,marginTop:20,letterSpacing:1 }}>I dati vengono salvati su questo dispositivo</p>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
